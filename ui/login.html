<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aiona Voice — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a; --card:#141414; --border:#2a2a2a;
  --accent:#00d4ff; --accent-hover:#00b8e6; --accent-light:#00d4ff20;
  --danger:#ff4757; --muted:#718093; --text:#e2e8f0; --text2:#a0aec0;
  --sans:'Inter',system-ui,-apple-system,sans-serif;
  --r:12px; --shadow:0 1px 3px rgba(0,0,0,0.3); --shadow-lg:0 10px 40px rgba(0,0,0,0.4);
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:1.6;
  padding:20px;
}
.login-container{
  width:100%;
  max-width:420px;
}
.login-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:48px;
  text-align:center;
  box-shadow:var(--shadow-lg);
}
.logo{
  width:64px;
  height:64px;
  background:var(--accent-light);
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 24px;
  font-size:32px;
}
h1{
  font-size:28px;
  font-weight:700;
  color:var(--text);
  margin-bottom:8px;
  letter-spacing:-0.5px;
}
.subtitle{
  color:var(--text2);
  font-size:14px;
  margin-bottom:32px;
  font-weight:500;
}
.form-group{
  margin-bottom:20px;
  text-align:left;
}
label{
  display:block;
  color:var(--text);
  margin-bottom:8px;
  font-size:13px;
  font-weight:600;
  letter-spacing:-0.1px;
}
input{
  width:100%;
  padding:14px 16px;
  background:var(--bg);
  color:var(--text);
  border:1px solid var(--border);
  border-radius:10px;
  font-size:14px;
  font-family:var(--sans);
  transition:all 0.2s;
}
input:focus{
  outline:none;
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-light);
}
input::placeholder{
  color:var(--muted);
}
button{
  width:100%;
  padding:14px 24px;
  background:var(--accent);
  color:#0a0a0a;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  font-size:14px;
  transition:all 0.2s;
  letter-spacing:-0.2px;
}
button:hover{
  background:var(--accent-hover);
  transform:translateY(-1px);
}
button:active{
  transform:translateY(0);
}
button:disabled{
  background:var(--muted);
  cursor:not-allowed;
  opacity:0.5;
  transform:none;
}
.error{
  color:var(--danger);
  font-size:13px;
  margin-top:16px;
  display:none;
  font-weight:500;
}
.loading{
  display:none;
  margin-top:16px;
  color:var(--text2);
  font-size:13px;
}
.forgot-password{
  margin-top:24px;
  font-size:13px;
}
.forgot-password a{
  color:var(--accent);
  text-decoration:none;
  font-weight:500;
}
.forgot-password a:hover{
  text-decoration:underline;
}
@keyframes spin{
  to{transform:rotate(360deg)}
}
.spinner{
  display:inline-block;
  width:16px;
  height:16px;
  border:2px solid var(--muted);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  margin-right:8px;
}
</style>
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <div class="logo">🤖</div>
    <h1>Aiona Voice</h1>
    <p class="subtitle">Sign in to access your dashboard</p>
    
    <form id="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input 
          type="text" 
          id="username" 
          name="username" 
          placeholder="Enter your username" 
          required
          autocomplete="username"
        >
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="Enter your password" 
          required
          autocomplete="current-password"
        >
      </div>
      
      <button type="submit" id="login-btn">
        <span id="btn-text">Sign In</span>
        <span id="btn-loading" class="loading"><span class="spinner"></span>Signing in...</span>
      </button>
      
      <div class="error" id="error-message"></div>
    </form>
    
    <div class="forgot-password">
      <a href="#">Forgot password?</a>
    </div>
  </div>
</div>

<script>
const loginForm = document.getElementById('login-form');
const loginBtn = document.getElementById('login-btn');
const btnText = document.getElementById('btn-text');
const btnLoading = document.getElementById('btn-loading');
const errorMessage = document.getElementById('error-message');

loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  
  // Show loading state
  loginBtn.disabled = true;
  btnText.style.display = 'none';
  btnLoading.style.display = 'inline';
  errorMessage.style.display = 'none';
  
  try {
    const response = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ username, password })
    });
    
    const data = await response.json();
    
    if (response.ok) {
      // Store token in localStorage
      localStorage.setItem('auth_token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      
      // Redirect to dashboard
      window.location.href = '/';
    } else {
      // Show error
      errorMessage.textContent = data.message || 'Invalid credentials';
      errorMessage.style.display = 'block';
      
      // Reset button state
      loginBtn.disabled = false;
      btnText.style.display = 'inline';
      btnLoading.style.display = 'none';
    }
  } catch (error) {
    errorMessage.textContent = 'Connection error. Please try again.';
    errorMessage.style.display = 'block';
    
    // Reset button state
    loginBtn.disabled = false;
    btnText.style.display = 'inline';
    btnLoading.style.display = 'none';
  }
});

// Check if already logged in
window.addEventListener('load', () => {
  const token = localStorage.getItem('auth_token');
  if (token) {
    window.location.href = '/';
  }
});
</script>
</body>
</html>
